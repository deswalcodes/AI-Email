# Render Blueprint — deploy as a single Docker web service.
# After first deploy: add the GROQ_API_KEY env var, upload credentials.json as a
# Secret File at /etc/secrets/credentials.json, and set GOOGLE_OAUTH_REDIRECT_URI to
# https://<your-service>.onrender.com/api/gmail/oauth/callback (also add that exact URL
# to your Google OAuth client's Authorized redirect URIs).
services:
  - type: web
    name: ai-email-automation
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_CHAT_MODEL
        value: llama-3.3-70b-versatile
      - key: REPLY_MODE
        value: approve
      - key: GROQ_API_KEY
        sync: false          # set in dashboard (secret)
      - key: GOOGLE_CLIENT_SECRETS_FILE
        value: /etc/secrets/credentials.json
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false          # set to your onrender.com callback URL
